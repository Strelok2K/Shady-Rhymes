{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static '/style/style.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
    <title>{% block title %}{% endblock title %}</title>
</head>
<body>
    <header>
        <nav class="base_nav">
            <a class="home_link" href="{% url 'core:home' %}">
                <img class="home_img" src="{% static '/imgs/logo.png' %}" alt="">
            </a>
            <ul class="nav_list">
                <li class="nav_item"><a class="nav_link" href="{% url 'user_feedback:comment' %}">Feedback</a></li>
                <li class="nav_item"><a class="nav_link" href="{% url 'core:product' %}">Shop</a></li>
                <li class="nav_item"><a class="nav_link" href="">About Us</a></li>
                <li class="nav_item"><a class="nav_link" href="">Contact</a></li>
            </ul>
            <a class="cart_link" href="{% url 'user_feedback:cart' %}">
                <i class="cart_img fa-solid fa-bag-shopping"></i>
            </a>
        </nav>
    </header>
    {% block content %}
    {% endblock content %}
</body>
</html>
