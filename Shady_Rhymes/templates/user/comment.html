{% extends 'base.html' %}
{% load static %}
{% block title %}Feedback{% endblock title %}
{% block content %}
<img src="{% static '/imgs/bg-1.png' %}" class="header_bg">
<section class="add_feedback_section">
    <h1 class="add_feedback_section_title">Add Your Opinion</h1>
    <form class="add_feedback_form" method="post">
        {% csrf_token %}
        <input class="add_feedback_title" type="text" name="title" placeholder="Enter title of your message">
        <input class="add_feedback_message" name="message" placeholder="Enter your message">
        <div class="add_feedback_div">
            <input class="add_feedback_data" type="text" name="name" placeholder="Enter your full name">
            <input class="add_feedback_data" type="text" name="role" placeholder="Enter your ocupation">
        </div>
        <div class="add_feedback_div">
            <input class="add_feedback_data" type="text" name="rating" placeholder="Enter raiting for us">
            <button class="add_feedback_submit">Submit</button>
        </div>
    </form>
</section>
{% endblock content %}
